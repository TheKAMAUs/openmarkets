syntax = "proto3";

package ws_market_price;


message WsParamsPayload { // stringified payload linked to -> (string params) in WsData
    string market_id = 1;
    double yes_price = 2;
    double no_price = 3;
    uint64 timestamp = 4;
}

message BitcoinPricePayload {
    string symbol = 1;
    string market_id = 2;  // ✅ Add market ID
    double current_price = 3;
    double target_price = 4;
    int64 target_timestamp = 5;
    uint64 seconds_remaining = 6;
    bool is_above_target = 7;
    int64 timestamp = 8;
    double price_difference = 9;
    double percent_to_target = 10;
    bool less_than_40_secs = 11;
}

message MarketMessage {
  oneof payload {
    BitcoinPricePayload price = 1;
    WsParamsPayload params = 2;
  }
}

